name: Deploy to Google Apps Script (Multi-Env)

on:
  push:
    branches: [main, staging, dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Detect Environment
        id: detect-env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "env=PROD" >> $GITHUB_OUTPUT
            echo "branch=main" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            echo "env=STAGING" >> $GITHUB_OUTPUT
            echo "branch=staging" >> $GITHUB_OUTPUT
          else
            echo "env=DEV" >> $GITHUB_OUTPUT
            echo "branch=dev" >> $GITHUB_OUTPUT
          fi
      
      - name: Load Environment Config
        id: load-config
        run: |
          ENV="${{ steps.detect-env.outputs.env }}"
          SCRIPT_ID=$(jq -r ".environments.$ENV.scriptId" .idp-environments.json)
          SA_ENV=$(jq -r ".environments.$ENV.saEnv" .idp-environments.json)
          echo "script_id=$SCRIPT_ID" >> $GITHUB_OUTPUT
          echo "sa_env=$SA_ENV" >> $GITHUB_OUTPUT
          echo "✓ Environment: $ENV, Script ID: $SCRIPT_ID"
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install clasp
        run: npm install -g @google/clasp
      
      - name: Install jq
        run: sudo apt-get install -y jq
      
      - name: Create .clasp.json
        run: |
          echo '{
            "scriptId": "${{ steps.load-config.outputs.script_id }}",
            "rootDir": "."
          }' > .clasp.json
      
      - name: Create Service Account Key File
        env:
          SA_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY_${{ steps.detect-env.outputs.env }} }}
        run: |
          echo "$SA_KEY" > ./sa-key-raw.json
          if jq . ./sa-key-raw.json > ./sa-key.json 2>/dev/null; then
            echo "✓ Valid JSON"
            rm ./sa-key-raw.json
          else
            tr -d '\n' < ./sa-key-raw.json | sed 's/  */ /g' > ./sa-key-oneline.json
            if jq . ./sa-key-oneline.json > ./sa-key.json 2>/dev/null; then
              echo "✓ Fixed JSON"
              rm ./sa-key-raw.json ./sa-key-oneline.json
            else
              echo "ERROR: Invalid JSON"
              exit 1
            fi
          fi
      
      - name: Install Google Cloud SDK
        run: |
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | apt-key --keyring /usr/share/keyrings/cloud.google.gpg add -
          apt-get update && apt-get install -y google-cloud-sdk
      
      - name: Authenticate and Create .clasprc.json
        run: |
          gcloud auth activate-service-account --key-file=./sa-key.json --quiet
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          jq -n \
            --arg token "$ACCESS_TOKEN" \
            '{
              "token": {
                "access_token": $token,
                "refresh_token": "",
                "scope": "https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/script.deployments https://www.googleapis.com/auth/script.webapp.deploy https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.metadata",
                "token_type": "Bearer",
                "expiry_date": (now + 3600 | floor * 1000)
              },
              "oauth2ClientSettings": {
                "clientId": "",
                "clientSecret": "",
                "redirectUrl": "http://localhost"
              },
              "isLocalCreds": true
            }' > .clasprc.json
      
      - name: Deploy to Apps Script (${{ steps.detect-env.outputs.env }})
        run: clasp push -f
